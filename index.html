<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b1220">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Flag Game">
    <title>Flag Game</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=9">
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="resolver" aria-label="Current guess">
        <div id="resolvedName" class="resolved-name" aria-live="polite"></div>
        <button id="settingsButton" class="settings-button" type="button" aria-label="Settings" aria-expanded="false" aria-controls="settingsPanel">&#9881;</button>
        <div id="settingsPanel" class="settings-panel" hidden>
          <fieldset>
            <legend>Countries</legend>
            <label><input type="radio" name="countryMode" value="worldCup" checked> World Cup 2026</label>
            <label><input type="radio" name="countryMode" value="all"> All Countries</label>
          </fieldset>
          <fieldset>
            <legend>Hint</legend>
            <label><input type="radio" name="hintMode" value="firstLetter" checked> First Letter</label>
            <label><input type="radio" name="hintMode" value="twoLetter"> 2-Letter Code</label>
            <label><input type="radio" name="hintMode" value="threeLetter"> 3-Letter Code</label>
          </fieldset>
          <button id="showAllButton" class="settings-action-button" type="button">Show all</button>
          <button id="settingsResetButton" class="settings-reset-button" type="button">New game</button>
        </div>
      </section>

      <section class="flag-stage" aria-label="Flag to identify">
        <img id="flagImage" class="flag-image" alt="Mystery country flag">
        <div id="hintBadge" class="hint-badge" aria-hidden="true"></div>
        <canvas id="celebrationCanvas" class="celebration-canvas"></canvas>
      </section>

      <section class="controls" aria-label="Game controls">
        <button id="backButton" class="control-button" type="button">Back</button>
        <button id="scoreButton" class="score-button" type="button" aria-label="Score 0 right out of 0" disabled>0/0</button>
        <div class="right-controls">
          <button id="hintButton" class="control-button" type="button">Hint</button>
          <button id="skipButton" class="control-button" type="button">Skip</button>
        </div>
      </section>

      <section id="keyboard" class="keyboard" aria-label="On-screen keyboard"></section>
    </main>

    <div id="wrongOverlay" class="overlay" hidden>
      <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="wrongTitle">
        <h1 id="wrongTitle">BONG!</h1>
        <div class="overlay-actions">
          <button id="showButton" type="button">Show</button>
          <button id="againButton" type="button">Guess again</button>
        </div>
      </div>
    </div>

    <div id="allCountriesOverlay" class="all-countries-overlay" hidden>
      <div class="all-countries-page" role="dialog" aria-modal="true" aria-labelledby="allCountriesTitle">
        <header class="all-countries-header">
          <h1 id="allCountriesTitle">Countries</h1>
          <button id="allCountriesCloseButton" class="all-countries-close" type="button" aria-label="Close">X</button>
        </header>
        <div id="allCountriesList" class="all-countries-list"></div>
      </div>
    </div>

    <script src="app.js?v=13" type="module"></script>
  </body>
</html>
